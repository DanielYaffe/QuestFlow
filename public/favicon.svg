<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background: deep purple rounded square with gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1040"/>
      <stop offset="100%" stop-color="#3b1278"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffe87a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Outer sparkle ring (pixel-art style cross sparkles) -->
  <!-- top -->
  <polygon points="16,2 17,5 16,8 15,5" fill="#ffe87a" opacity="0.9"/>
  <!-- right -->
  <polygon points="30,16 27,17 24,16 27,15" fill="#ffe87a" opacity="0.9"/>
  <!-- bottom -->
  <polygon points="16,30 17,27 16,24 15,27" fill="#ffe87a" opacity="0.9"/>
  <!-- left -->
  <polygon points="2,16 5,17 8,16 5,15" fill="#ffe87a" opacity="0.9"/>

  <!-- Diagonal mini sparkles -->
  <polygon points="6,6 7,8 6,10 5,8"   fill="#c084fc" opacity="0.7" transform="rotate(45,6,8)"/>
  <polygon points="26,6 27,8 26,10 25,8" fill="#c084fc" opacity="0.7" transform="rotate(45,26,8)"/>
  <polygon points="6,22 7,24 6,26 5,24"  fill="#c084fc" opacity="0.7" transform="rotate(45,6,24)"/>
  <polygon points="26,22 27,24 26,26 25,24" fill="#c084fc" opacity="0.7" transform="rotate(45,26,24)"/>

  <!-- Star body (5-point, bold pixel-ish) -->
  <polygon
    points="16,5 18.5,12.5 26.5,12.5 20.2,17.2 22.5,25 16,20.5 9.5,25 11.8,17.2 5.5,12.5 13.5,12.5"
    fill="#fde68a"
    stroke="#f59e0b"
    stroke-width="0.8"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Star sheen (top-left highlight) -->
  <polygon
    points="16,5 17.2,9 16,8 14.8,9"
    fill="white"
    opacity="0.55"
  />

  <!-- Cute pixel eyes on the star (MapleStory face style) -->
  <rect x="13" y="14" width="2" height="2" rx="0.5" fill="#3b1278"/>
  <rect x="17" y="14" width="2" height="2" rx="0.5" fill="#3b1278"/>
  <!-- tiny shine dots -->
  <rect x="13.5" y="14" width="0.7" height="0.7" fill="white"/>
  <rect x="17.5" y="14" width="0.7" height="0.7" fill="white"/>
  <!-- smile -->
  <path d="M14 17 Q16 18.5 18 17" stroke="#3b1278" stroke-width="0.8" stroke-linecap="round" fill="none"/>
</svg>
